<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sąsiedzki Ryneczek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sąsiedzki Ryneczek</h1>
            <p class="subtitle">Domowe produkty od Twoich sąsiadów</p>
        </header>

        <main>
            <section id="add-listing" class="glass-card">
                <h2>Opublikuj nową ofertę</h2>
                <form id="listing-form">
                    <div class="input-group">
                        <label>Tytuł ogłoszenia</label>
                        <input type="text" id="listing-title" placeholder="np. Domowa Piekarnia u Michała" required>
                    </div>

                    <div id="products-to-add">
                        <div class="product-item-form glass-card-dark">
                            <div class="input-group">
                                <label>Nazwa produktu</label>
                                <input type="text" class="p-name" placeholder="np. Chleb wiejski" required>
                            </div>
                            <div class="row">
                                <div class="input-group">
                                    <label>Cena za jednostkę (zł)</label>
                                    <input type="number" class="p-price" step="0.01" placeholder="15.00" required>
                                </div>
                                <div class="input-group">
                                    <label>Jednostka (szt/kg/g)</label>
                                    <input type="text" class="p-unit" placeholder="szt" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="input-group">
                                    <label>Łączna ilość na sprzedaż</label>
                                    <input type="number" class="p-total" step="0.01" required>
                                </div>
                                <div class="input-group">
                                    <label>Minimalny skok (np. 0.5 kg lub 1 szt)</label>
                                    <input type="number" class="p-step" step="0.01" required>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="button" id="add-more-items" class="btn-secondary">+ Dodaj kolejny produkt</button>

                    <div class="input-group" style="margin-top: 20px;">
                        <label>Terminy odbioru</label>
                        <input type="text" id="pickupTimes" placeholder="np. Piątek po 18, Sobota rano" required>
                    </div>

                    <div class="input-group">
                        <label class="file-label">
                            <span>📷 Zdjęcie poglądowe</span>
                            <input type="file" id="productImage" required>
                        </label>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Twoje Imię</label>
                            <input type="text" id="sellerName" placeholder="Michał" required>
                        </div>
                        <div class="input-group">
                            <label>PIN (4 cyfry)</label>
                            <input type="password" id="pin" maxlength="4" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn">Opublikuj ogłoszenie</button>
                </form>
            </section>

            <section id="listings">
                <h2>Aktualne pyszności</h2>
                <div id="listings-container"></div>
            </section>
        </main>
    </div>

    <div id="reservation-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <h3>Co zamawiasz?</h3>
            <div id="modal-order-items"></div>
            
            <div class="total-summary">
                Do zapłaty: <span id="modal-total-price">0.00</span> zł
            </div>

            <div class="input-group">
                <label>Twoje imię:</label>
                <input type="text" id="buyerName" placeholder="Jak sąsiad ma Cię podpisać?" required>
            </div>
            <div class="input-group">
                <label>Daj znać, kiedy wpadniesz:</label>
                <input type="text" id="buyerPickupTime" placeholder="np. Wstąpię jutro około 10" required>
            </div>
            
            <div class="modal-buttons">
                <button id="confirm-booking-btn" class="btn-primary">Potwierdzam zamówienie</button>
                <button onclick="closeModals()" class="btn-secondary">Anuluj</button>
            </div>
        </div>
    </div>

    <div id="seller-modal" class="modal hidden">
        <div class="modal-content glass-card seller-view">
            <h3>Lista zamówień</h3>
            <div id="reservations-container" class="reservations-panel"></div>
            <button id="delete-listing-btn" class="btn-delete">Zdejmij ogłoszenie z tablicy</button>
            <button onclick="closeModals()" class="btn-secondary">Zamknij</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

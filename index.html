<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sąsiedzki Ryneczek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sąsiedzki Ryneczek</h1>
            <p class="subtitle">Produkty prosto od sąsiadów</p>
            <div class="header-action">
                <button id="open-add-listing-btn" class="btn-add-main">➕ Opublikuj nową ofertę</button>
            </div>
        </header>

        <main>
            <section id="listings">
                <div id="listings-container">
                    <p class="loading">Szukamy świeżych produktów...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="add-listing-modal" class="modal hidden">
        <div class="modal-content modal-solid scrollable-modal">
            <h2 id="modal-title">Nowa oferta</h2>
            <form id="listing-form">
                <div class="form-row-mobile">
                    <div class="input-group">
                        <label>Twoje Imię</label>
                        <input type="text" id="sellerName" placeholder="Np. Michał" required>
                    </div>
                    <div class="input-group">
                        <label>Adres odbioru</label>
                        <input type="text" id="pickupAddress" placeholder="Np. ul. Słowika 24" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Możliwe godziny odbioru</label>
                    <input type="text" id="pickupTimes" placeholder="Np. Pon-Pt 17:00-20:00" required>
                </div>
                <hr class="divider">
                <div id="products-to-add"></div>
                <button type="button" id="add-more-items" class="btn-secondary-outline">+ Dodaj kolejny produkt</button>
                
                <div class="input-group" style="margin-top: 15px;">
                    <label>PIN ogłoszenia (widoczny)</label>
                    <input type="text" id="pin" maxlength="4" placeholder="4 cyfry" required>
                </div>
                <button type="submit" id="submitBtn" class="btn-primary-action">Zapisz i Opublikuj</button>
                <button type="button" onclick="closeModals()" class="btn-cancel-link">Anuluj</button>
            </form>
        </div>
    </div>

    <div id="reservation-modal" class="modal hidden">
        <div class="modal-content modal-solid scrollable-modal">
            <h3 id="res-modal-title">Twoje zamówienie</h3>
            <p id="buyer-status-msg" class="info-note">💡 Podaj imię i PIN, by zamówić lub zmienić.</p>
            
            <div id="modal-order-items" class="order-list-container"></div>
            
            <div class="total-bar">
                <span>Do zapłaty:</span>
                <span id="modal-total-price">0.00</span> zł
            </div>
            
            <div class="form-row-mobile">
                <div class="input-group">
                    <label>Twoje imię:</label>
                    <input type="text" id="buyerName" placeholder="Imię" required>
                </div>
                <div class="input-group">
                    <label>Twój PIN (4 cyfry):</label>
                    <input type="text" id="buyerPin" maxlength="4" placeholder="Kod" required>
                </div>
            </div>
            <div class="input-group">
                <label>Kiedy odbierzesz?</label>
                <input type="text" id="buyerPickupTime" placeholder="Np. Dzisiaj po 18:00" required>
            </div>
            
            <div class="modal-actions-vertical">
                <button id="confirm-booking-btn" class="btn-primary-action">Zatwierdź zamówienie</button>
                <button type="button" onclick="closeModals()" class="btn-cancel-link">Wróć do ogłoszeń</button>
            </div>
        </div>
    </div>

    <div id="seller-modal" class="modal hidden">
        <div class="modal-content modal-solid scrollable-modal">
            <div class="modal-nav">
                <h3>Panel Zarządzania</h3>
                <div class="tabs">
                    <button id="view-by-person" class="tab active">👤 Osoby</button>
                    <button id="view-by-product" class="tab">📦 Produkty</button>
                </div>
            </div>
            <div id="reservations-container" class="res-list-ui"></div>
            <div class="admin-footer-btns">
                <button id="edit-listing-btn" class="btn-warning">✏️ Modyfikuj ogłoszenie</button>
                <button id="delete-listing-btn" class="btn-danger">🗑️ Usuń całą ofertę</button>
                <button onclick="closeModals()" class="btn-secondary-outline">Zamknij</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sąsiedzki Ryneczek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sąsiedzki Ryneczek</h1>
            <p class="subtitle">Domowe produkty od Twoich sąsiadów</p>
        </header>

        <main>
            <section id="add-listing" class="glass-card">
                <h2>Dodaj nowe ogłoszenie</h2>
                <form id="listing-form">
                    <div class="input-group">
                        <label>Co oferujesz?</label>
                        <input type="text" id="title" placeholder="np. Chleb Rysia" required>
                    </div>
                    
                    <div class="row">
                        <div class="input-group">
                            <label>Cena (zł)</label>
                            <input type="number" id="price" step="0.01" required>
                        </div>
                        <div class="input-group">
                            <label>Jednostka</label>
                            <input type="text" id="unit" placeholder="szt, kg, słoik" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Dostępność (Kiedy sąsiedzi mogą odbierać?)</label>
                        <input type="text" id="pickupTimes" placeholder="np. Codziennie po 18:00, weekendy rano" required>
                    </div>

                    <div class="input-group">
                        <label>Opis i składniki</label>
                        <textarea id="description" placeholder="Opisz produkt i alergeny..." required></textarea>
                    </div>

                    <div class="input-group">
                        <label class="file-label">
                            <span>📷 Dodaj zdjęcie</span>
                            <input type="file" id="productImage" required>
                        </label>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Twoje Imię</label>
                            <input type="text" id="sellerName" placeholder="Kasia" required>
                        </div>
                        <div class="input-group">
                            <label>PIN (do panelu sprzedawcy)</label>
                            <input type="password" id="pin" maxlength="4" placeholder="4 cyfry" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn">Opublikuj ogłoszenie</button>
                </form>
            </section>

            <section id="listings">
                <h2>Aktualne ogłoszenia</h2>
                <div id="listings-container">
                    <p class="loading">Ładowanie...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Sąsiedzki Ryneczek</p>
        </footer>
    </div>

    <div id="reservation-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <h3>Zarezerwuj produkt</h3>
            <p id="modal-product-info"></p>
            <div class="input-group">
                <label>Twoje imię:</label>
                <input type="text" id="buyerName" placeholder="Np. Marek z 4 piętra" required>
            </div>
            <div class="input-group">
                <label>Kiedy odbierzesz?</label>
                <input type="text" id="buyerPickupTime" placeholder="np. Dzisiaj po 19:00, jutro rano" required>
            </div>
            <div class="modal-buttons">
                <button id="confirm-booking-btn" class="btn-primary">Potwierdzam rezerwację</button>
                <button onclick="closeModals()" class="btn-secondary">Anuluj</button>
            </div>
        </div>
    </div>

    <div id="seller-modal" class="modal hidden">
        <div class="modal-content glass-card seller-view">
            <h3>Panel Sprzedawcy</h3>
            <p id="seller-modal-product-title" style="font-weight: bold;"></p>
            <div id="reservations-container" class="reservations-panel"></div>
            <div class="modal-buttons" style="flex-direction: column;">
                <button id="delete-listing-btn" class="btn-delete">Usuń to ogłoszenie</button>
                <button onclick="closeModals()" class="btn-secondary">Zamknij</button>
            </div>
        </div>
    </div>

    <div id="success-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <h2>🎉 Zapisano rezerwację!</h2>
            <p>Sąsiad wie, że wpadniesz. Możesz dodać to do kalendarza:</p>
            <button id="add-to-calendar-btn" class="btn-calendar">📅 Dodaj do Kalendarza Google</button>
            <button onclick="location.reload()" class="btn-secondary">Zamknij</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

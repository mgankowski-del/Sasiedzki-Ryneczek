<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sąsiedzki Ryneczek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sąsiedzki Ryneczek</h1>
            <p class="subtitle">Domowe produkty od Twoich sąsiadów</p>
            <button id="open-add-listing-btn" class="btn-add-main">➕ Dodaj swoje ogłoszenie</button>
        </header>

        <main>
            <section id="listings">
                <h2>Aktualne pyszności</h2>
                <div id="listings-container">
                    <p class="loading">Ładowanie...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Sąsiedzki Ryneczek</p>
        </footer>
    </div>

    <div id="add-listing-modal" class="modal hidden">
        <div class="modal-content modal-solid scrollable-modal">
            <h2>Nowa oferta</h2>
            <form id="listing-form">
                <div class="input-group">
                    <label>Tytuł ogłoszenia</label>
                    <input type="text" id="listing-title" placeholder="np. Domowe Wypieki" required>
                </div>

                <div id="products-to-add">
                    <div class="product-item-form glass-card-dark">
                        <div class="input-group">
                            <label>Nazwa produktu</label>
                            <input type="text" class="p-name" placeholder="np. Chleb" required>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Cena (zł)</label>
                                <input type="number" class="p-price" step="0.01" required>
                            </div>
                            <div class="input-group">
                                <label>Jednostka</label>
                                <input type="text" class="p-unit" placeholder="szt" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Ilość</label>
                                <input type="number" class="p-total" step="0.01" required>
                            </div>
                            <div class="input-group">
                                <label>Krok</label>
                                <input type="number" class="p-step" step="0.01" value="1" required>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button type="button" id="add-more-items" class="btn-secondary">+ Dodaj kolejny produkt</button>

                <div class="input-group" style="margin-top: 20px;">
                    <label>Kiedy odbiór?</label>
                    <input type="text" id="pickupTimes" placeholder="np. Sobota 10-12" required>
                </div>

                <div class="input-group">
                    <label class="file-label">
                        <span>📷 Zdjęcie zbiorcze</span>
                        <input type="file" id="productImage" required>
                    </label>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>Twoje Imię</label>
                        <input type="text" id="sellerName" required>
                    </div>
                    <div class="input-group">
                        <label>PIN (4 cyfry)</label>
                        <input type="password" id="pin" maxlength="4" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">Opublikuj ogłoszenie</button>
                <button type="button" onclick="closeModals()" class="btn-cancel">Anuluj</button>
            </form>
        </div>
    </div>

    <div id="reservation-modal" class="modal hidden">
        <div class="modal-content modal-solid">
            <h3>Twoje zamówienie</h3>
            <div id="modal-order-items"></div>
            <div class="total-summary">Suma: <span id="modal-total-price">0.00</span> zł</div>
            <div class="input-group">
                <label>Twoje imię:</label>
                <input type="text" id="buyerName" required>
            </div>
            <div class="input-group">
                <label>Kiedy wpadniesz?</label>
                <input type="text" id="buyerPickupTime" required>
            </div>
            <div class="modal-buttons">
                <button id="confirm-booking-btn" class="btn-primary">Potwierdzam</button>
                <button onclick="closeModals()" class="btn-cancel">Anuluj</button>
            </div>
        </div>
    </div>

    <div id="seller-modal" class="modal hidden">
        <div class="modal-content modal-solid">
            <h3>Lista rezerwacji</h3>
            <div id="reservations-container" class="reservations-panel"></div>
            <button id="delete-listing-btn" class="btn-delete">Usuń ogłoszenie</button>
            <button onclick="closeModals()" class="btn-cancel">Zamknij</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sąsiedzki Ryneczek</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <header>
        <h1>🍏 Sąsiedzki Ryneczek</h1>
        <p>Świeże produkty od Twoich sąsiadów</p>
    </header>

    <main>
        <div class="actions-bar">
            <button id="btn-open-add" class="btn-primary">➕ Dodaj swoją ofertę</button>
        </div>

        <section id="listings-container">
            <div class="loader">Ładowanie ofert...</div>
        </section>
    </main>

    <div id="add-listing-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModals()">&times;</span>
            <h2>Nowa oferta</h2>
            <form id="listing-form">
                <div class="form-section">
                    <h3>Dane sprzedawcy</h3>
                    <div class="input-group">
                        <label>Twoje Imię / Nazwa</label>
                        <input type="text" id="sellerName" required>
                    </div>
                    <div class="input-group">
                        <label>Telefon kontaktowy</label>
                        <input type="tel" id="sellerPhone" required>
                    </div>
                    <div class="input-group">
                        <label>Adres odbioru</label>
                        <input type="text" id="pickupAddress" placeholder="np. ul. Polna 4, klatka 2" required>
                    </div>
                    <div class="input-group">
                        <label>Kiedy można odbierać?</label>
                        <input type="text" id="pickupTimes" placeholder="np. Codziennie 17:00-20:00" required>
                    </div>
                    <div class="input-group">
                        <label>Data ważności oferty</label>
                        <input type="date" id="expiryDate" required>
                    </div>
                    <div class="input-group">
                        <label>PIN do edycji (4 cyfry)</label>
                        <input type="password" id="pin" maxlength="4" pattern="\d{4}" required>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Produkty</h3>
                    <div id="products-to-add">
                        </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-save">Opublikuj ofertę</button>
            </form>
        </div>
    </div>

    <div id="order-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModals()">&times;</span>
            <div id="order-details">
                </div>
        </div>
    </div>

    <div id="manage-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModals()">&times;</span>
            <div id="manage-content">
                </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script src="order.js"></script>
    <script src="manage.js"></script>
</body>
</html>

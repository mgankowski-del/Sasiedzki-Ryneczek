<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sąsiedzki Ryneczek - Triton Country</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="main-tabs-container">
                <button id="tab-ryneczek" class="main-tab active">🛒 Ryneczek</button>
                <button id="tab-fachowcy" class="main-tab">⭐ Fachowcy</button>
            </div>

            <h1 id="main-title" style="margin-top: 15px;">🏠 Sąsiedzki Ryneczek</h1>
            <p class="subtitle" id="main-subtitle">Usługi, handel i jedzenie od sąsiadów</p>
            
            <button id="btn-open-add" class="btn-add-main">+ Wystaw ogłoszenie / usługę</button>
            <button id="btn-open-add-specialist" class="btn-add-main hidden" style="background:#f59e0b;">+ Poleć sprawdzonego fachowca</button>
        </header>

        <div id="view-ryneczek">
            <div class="category-filters">
                <button class="filter-btn active" data-cat="all">Wszystko</button>
                <button class="filter-btn" data-cat="🎁 Za darmo">🎁 Za darmo</button>
                <button class="filter-btn" data-cat="🛍️ Sprzedaż">🛍️ Sprzedaż</button>
                <button class="filter-btn" data-cat="🍕 Jedzenie">🍕 Jedzenie</button>
                <button class="filter-btn" data-cat="🛠️ Usługi">🛠️ Usługi</button>
            </div>
            <div id="listings-container"></div>
        </div>

        <div id="view-fachowcy" class="hidden">
            <div id="specialists-container"></div>
        </div>
    </div>

    <div id="add-listing-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModals()">&times;</span>
            <h2 id="modal-title">Nowa oferta</h2>
            
            <form id="listing-form">
                <div class="form-section">
                    <div class="input-group">
                        <label>Kategoria</label>
                        <select id="category">
                            <option value="🛍️ Sprzedaż">🛍️ Sprzedaż (rzeczy, przedmioty)</option>
                            <option value="🎁 Za darmo">🎁 Za darmo (oddam rzeczy)</option>
                            <option value="🍕 Jedzenie">🍕 Jedzenie (wypieki, obiady)</option>
                            <option value="🛠️ Usługi">🛠️ Usługi (naprawy, pomoc, lekcje)</option>
                        </select>
                    </div>
                    <div class="form-grid">
                        <div class="input-group"><label>Twoje Imię / Nazwa</label><input type="text" id="sellerName" required></div>
                        <div class="input-group"><label>Telefon</label><input type="tel" id="sellerPhone" required></div>
                    </div>
                    <div class="input-group"><label>Adres (nr domu)</label><input type="text" id="pickupAddress" required></div>
                    <div class="input-group"><label>Kiedy dostępne / Godziny</label><input type="text" id="pickupTimes" placeholder="np. Pon-Pt 17-20"></div>
                    <div class="form-grid">
                        <div class="input-group"><label>Ważne do (opcjonalnie)</label><input type="date" id="expiryDate"></div>
                        <div class="input-group"><label>PIN (do edycji)</label><input type="number" id="pin" required></div>
                    </div>
                </div>

                <div class="service-price-box">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: bold; color: var(--primary);">
                        <input type="checkbox" id="enablePriceList" style="width: 20px; height: 20px;"> 💰 Dodaj specyficzny cennik (np. dla usług)
                    </label>
                    <div id="priceListInputs" class="hidden" style="margin-top: 15px;">
                        <div id="priceRowsContainer"></div>
                        <button type="button" id="addPriceRowBtn" class="btn-secondary-action" style="margin-top: 10px; padding: 8px;">+ Dodaj kolejną pozycję</button>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Zdjęcia i stany magazynowe</h3>
                    <div id="products-to-add"></div>
                    <button type="button" id="add-more-items" class="btn-secondary-action">+ Dodaj kolejny przedmiot ze zdjęciem</button>
                </div>

                <div style="margin-top: 20px;">
                    <button type="submit" id="submitBtn" class="btn-add-main">Opublikuj ofertę</button>
                </div>
            </form>
        </div>
    </div>

    <div id="add-specialist-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModals()">&times;</span>
            <h2>Poleć fachowca</h2>
            <p style="font-size:0.85rem; color:#6b7280; margin-bottom:20px;">Podziel się kontaktem do sprawdzonego eksperta.</p>
            
            <form id="specialist-form">
                <div class="form-section">
                    <div class="input-group"><label>Kogo polecasz? (Imię / Nazwa firmy)</label><input type="text" id="specName" placeholder="np. Hydraulik Jan" required></div>
                    <div class="input-group"><label>Zawód / Specjalizacja</label><input type="text" id="specProfession" placeholder="np. Hydraulik, Sprzątanie" required></div>
                    <div class="input-group"><label>Numer telefonu fachowca</label><input type="tel" id="specPhone" required></div>
                    <div class="input-group"><label>Dlaczego polecasz? (Krótka opinia)</label><textarea id="specDesc" placeholder="Szybko, sprawnie i tanio. Robił nam łazienkę..." required></textarea></div>
                    
                    <div class="form-grid" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                        <div class="input-group"><label>Kto poleca? (Twoje imię)</label><input type="text" id="specAddedBy" required></div>
                        <div class="input-group"><label>Twój PIN (do usunięcia)</label><input type="number" id="specPin" required></div>
                    </div>
                </div>
                <button type="submit" id="submitSpecBtn" class="btn-add-main" style="background:#f59e0b;">Dodaj do polecanych</button>
            </form>
        </div>
    </div>

    <div id="reservation-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModals()">&times;</span>
            <h2>Zarezerwuj / Zamów</h2>
            <p id="modal-pickup-info" style="font-size:0.9rem; color:#6b7280; margin-bottom:15px;"></p>
            <div id="modal-order-items"></div>
            <div class="total-bar"> Suma z koszyka: <span id="modal-total-price">0</span> zł </div>
            <div class="form-section">
                <div class="input-group"><label>Twoje Imię</label><input type="text" id="buyerName"></div>
                <div class="form-grid"><div class="input-group"><label>Telefon</label><input type="tel" id="buyerPhone"></div><div class="input-group"><label>Twój PIN</label><input type="number" id="buyerPin"></div></div>
                <div class="input-group"><label>Kiedy skorzystasz/odbierzesz?</label><input type="text" id="buyerPickupTime"></div>
            </div>
            <button id="confirm-booking-btn" class="btn-add-main">Wyślij rezerwację</button>
        </div>
    </div>

    <div id="seller-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModals()">&times;</span>
            <h2>Zarządzanie ofertą</h2>
            <div class="tabs"><button class="tab active" id="view-by-person">Zamówienia</button><button class="tab" id="view-by-product">Magazyn</button></div>
            <div id="reservations-container"></div>
            <div style="margin-top:20px; display:flex; gap:10px;"><button id="btn-edit-offer" class="btn-warning-action">Edytuj</button><button id="btn-delete-offer" class="btn-danger-action">Usuń wszystko</button></div>
        </div>
    </div>

    <div id="image-modal" class="modal hidden" onclick="window.closeModals()">
        <img id="enlarged-image" style="max-width:95%; max-height:90vh; border-radius:12px; margin:auto;">
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

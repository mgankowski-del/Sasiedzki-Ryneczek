<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sąsiedzki Ryneczek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sąsiedzki Ryneczek</h1>
            <p class="subtitle">Domowe produkty od Twoich sąsiadów</p>
        </header>

        <main>
            <section id="add-listing" class="glass-card">
                <h2>Dodaj nowe ogłoszenie</h2>
                <form id="listing-form">
                    <div class="input-group">
                        <label>Co oferujesz?</label>
                        <input type="text" id="title" placeholder="np. Chleb Rysia" required>
                    </div>
                    
                    <div class="row">
                        <div class="input-group">
                            <label>Cena (zł)</label>
                            <input type="number" id="price" step="0.01" required>
                        </div>
                        <div class="input-group">
                            <label>Jednostka</label>
                            <input type="text" id="unit" placeholder="szt, kg, słoik" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Kiedy można odebrać?</label>
                        <input type="text" id="pickupTimes" placeholder="np. Jutro po 17:00" required>
                    </div>

                    <div class="input-group">
                        <label>Opis / Alergeny</label>
                        <textarea id="description" placeholder="Opisz swój produkt..." required></textarea>
                    </div>

                    <div class="input-group">
                        <label class="file-label">
                            <span>📷 Wybierz zdjęcie</span>
                            <input type="file" id="productImage" accept="image/*" required>
                        </label>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Twoje Imię</label>
                            <input type="text" id="sellerName" placeholder="Michał" required>
                        </div>
                        <div class="input-group">
                            <label>PIN (do usuwania)</label>
                            <input type="password" id="pin" maxlength="4" placeholder="4 cyfry" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn">Opublikuj ogłoszenie</button>
                </form>
            </section>

            <section id="listings">
                <h2>Aktualne ogłoszenia</h2>
                <div id="listings-container">
                    <p class="loading">Ładowanie ogłoszeń...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="reservation-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <h3>Zarezerwuj produkt</h3>
            <p id="modal-product-info"></p>
            <div class="input-group">
                <label>Kiedy przyjdziesz po odbiór?</label>
                <input type="datetime-local" id="buyerPickupTime" required>
            </div>
            <div class="modal-buttons">
                <button id="confirm-booking-btn" class="btn-primary">Potwierdzam</button>
                <button id="close-modal-btn" class="btn-secondary">Anuluj</button>
            </div>
        </div>
    </div>

    <div id="success-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <h2>🎉 Zarezerwowano!</h2>
            <p>Dodaj termin do kalendarza:</p>
            <button id="add-to-calendar-btn" class="btn-calendar">📅 Dodaj do Kalendarza</button>
            <button onclick="location.reload()" class="btn-secondary">Zamknij</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

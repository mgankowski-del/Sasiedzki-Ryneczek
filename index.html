<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sąsiedzki Ryneczek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sąsiedzki Ryneczek</h1>
        <p>Domowe produkty od Twoich sąsiadów</p>
    </header>

    <main>
        <section id="add-listing">
            <h2>Dodaj nowe ogłoszenie</h2>
            <form id="listing-form">
                <input type="text" id="title" placeholder="Co oferujesz? (np. Chleb Rysia)" required>
                
                <div class="input-group">
                    <input type="number" id="price" placeholder="Cena" step="0.01" required>
                    <input type="text" id="unit" placeholder="Jednostka (np. szt., kg)" required>
                </div>

                <textarea id="description" placeholder="Opisz swój produkt..." required></textarea>

                <div class="file-upload">
                    <label for="productImage">Dodaj zdjęcie produktu:</label>
                    <input type="file" id="productImage" accept="image/*, .jpg, .jpeg, .png, .webp" required>
                </div>

                <button type="submit" id="submitBtn">Opublikuj ogłoszenie</button>
            </form>
        </section>

        <hr>

        <section id="listings">
            <h2>Aktualne ogłoszenia</h2>
            <div id="listings-container">
                <p class="loading">Ładowanie ogłoszeń...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sąsiedzki Ryneczek - Twoja lokalna społeczność</p>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>

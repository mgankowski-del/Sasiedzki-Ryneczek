<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sąsiedzki Ryneczek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sąsiedzki Ryneczek</h1>
            <p class="subtitle">Produkty prosto od sąsiadów</p>
            <button id="open-add-listing-btn" class="btn-add-main">➕ Opublikuj nową ofertę</button>
        </header>

        <main>
            <section id="listings">
                <div id="listings-container">
                    <p class="loading">Ładowanie świeżych produktów...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Sąsiedzki Ryneczek</p>
        </footer>
    </div>

    <div id="add-listing-modal" class="modal hidden">
        <div class="modal-content modal-solid scrollable-modal">
            <h2 id="modal-title">Nowa oferta</h2>
            <form id="listing-form">
                <div class="row">
                    <div class="input-group">
                        <label>Twoje Imię</label>
                        <input type="text" id="sellerName" placeholder="Np. Michał" required>
                    </div>
                    <div class="input-group">
                        <label>Adres odbioru</label>
                        <input type="text" id="pickupAddress" placeholder="Np. ul. Polna 4/12" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Możliwe godziny odbioru</label>
                    <input type="text" id="pickupTimes" class="wide-input" placeholder="Np. Pon-Pt 17:00-20:00, Soboty rano" required>
                </div>

                <hr>
                <div id="products-to-add">
                    </div>
                
                <button type="button" id="add-more-items" class="btn-secondary">+ Dodaj kolejny produkt</button>

                <div class="row" style="margin-top: 20px;">
                    <div class="input-group">
                        <label>PIN (4 cyfry)</label>
                        <input type="password" id="pin" maxlength="4" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">Zapisz i Opublikuj</button>
                <button type="button" onclick="closeModals()" class="btn-cancel">Anuluj</button>
            </form>
        </div>
    </div>

    <div id="reservation-modal" class="modal hidden">
        <div class="modal-content modal-solid">
            <h3 id="res-modal-title">Złóż zamówienie</h3>
            <div id="modal-order-items"></div>
            <div class="total-summary">Razem: <span id="modal-total-price">0.00</span> zł</div>
            <div class="input-group">
                <label>Twoje imię:</label>
                <input type="text" id="buyerName" required>
            </div>
            <div class="input-group">
                <label>Kiedy odbierzesz?</label>
                <input type="text" id="buyerPickupTime" required>
            </div>
            <div class="modal-buttons">
                <button id="confirm-booking-btn" class="btn-primary">Potwierdzam</button>
                <button onclick="closeModals()" class="btn-cancel">Anuluj</button>
            </div>
        </div>
    </div>

    <div id="seller-modal" class="modal hidden">
        <div class="modal-content modal-solid">
            <h3>Panel Zarządzania</h3>
            <div id="reservations-container" class="reservations-panel"></div>
            <div class="modal-buttons-grid">
                <button id="download-report-btn" class="btn-report">📥 Pobierz podsumowanie (CSV)</button>
                <button id="edit-listing-btn" class="btn-edit">✏️ Modyfikuj ogłoszenie</button>
                <button id="delete-listing-btn" class="btn-delete">🗑️ Usuń ogłoszenie</button>
            </div>
            <button onclick="closeModals()" class="btn-cancel">Zamknij</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

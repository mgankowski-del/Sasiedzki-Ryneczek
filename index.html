<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sąsiedzki Ryneczek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sąsiedzki Ryneczek</h1>
            <p class="subtitle">Domowe produkty od Twoich sąsiadów</p>
        </header>

        <main>
            <section id="add-listing" class="glass-card">
                <h2>Opublikuj ofertę</h2>
                <form id="listing-form">
                    <div class="input-group">
                        <label>Tytuł ogłoszenia (np. Sobotni koszyk Rysia)</label>
                        <input type="text" id="listing-title" placeholder="Wspólna nazwa dla Twoich produktów" required>
                    </div>

                    <div id="products-to-add">
                        <div class="product-item-form glass-card-dark">
                            <div class="input-group">
                                <label>Nazwa produktu</label>
                                <input type="text" class="p-name" placeholder="np. Chleb żytni" required>
                            </div>
                            <div class="row">
                                <div class="input-group">
                                    <label>Cena za jednostkę (zł)</label>
                                    <input type="number" class="p-price" step="0.01" placeholder="20.00" required>
                                </div>
                                <div class="input-group">
                                    <label>Jednostka</label>
                                    <input type="text" class="p-unit" placeholder="kg lub szt" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="input-group">
                                    <label>Łączna ilość</label>
                                    <input type="number" class="p-total" step="0.01" placeholder="5" required>
                                </div>
                                <div class="input-group">
                                    <label>Min. zamówienie (krok)</label>
                                    <input type="number" class="p-step" step="0.01" placeholder="0.25" required>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="button" id="add-more-items" class="btn-secondary">+ Dodaj kolejny produkt do tego ogłoszenia</button>

                    <hr>
                    <div class="input-group">
                        <label>Kiedy można odbierać?</label>
                        <input type="text" id="pickupTimes" placeholder="np. Sobota rano" required>
                    </div>

                    <div class="input-group">
                        <label class="file-label">
                            <span>📷 Dodaj zdjęcie zbiorcze</span>
                            <input type="file" id="productImage" required>
                        </label>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Twoje Imię</label>
                            <input type="text" id="sellerName" placeholder="Kasia" required>
                        </div>
                        <div class="input-group">
                            <label>PIN (4 cyfry)</label>
                            <input type="password" id="pin" maxlength="4" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn">Opublikuj listę produktów</button>
                </form>
            </section>

            <section id="listings">
                <h2>Aktualne oferty</h2>
                <div id="listings-container"></div>
            </section>
        </main>
    </div>

    <div id="reservation-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <h3>Złóż zamówienie</h3>
            <div id="modal-order-items"></div> <div class="total-summary glass-card-dark">
                Suma: <span id="modal-total-price">0.00</span> zł
            </div>

            <div class="input-group">
                <label>Twoje imię:</label>
                <input type="text" id="buyerName" required>
            </div>
            <div class="input-group">
                <label>Kiedy wpadniesz?</label>
                <input type="text" id="buyerPickupTime" placeholder="np. Dziś po 18" required>
            </div>
            
            <div class="modal-buttons">
                <button id="confirm-booking-btn" class="btn-primary">Zamawiam i rezerwuję</button>
                <button onclick="closeModals()" class="btn-secondary">Anuluj</button>
            </div>
        </div>
    </div>

    <div id="seller-modal" class="modal hidden">
        <div class="modal-content glass-card seller-view">
            <h3>Panel Zarządzania</h3>
            <div id="reservations-container" class="reservations-panel"></div>
            <button id="delete-listing-btn" class="btn-delete">Usuń całe ogłoszenie</button>
            <button onclick="closeModals()" class="btn-secondary">Zamknij</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
